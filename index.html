            '2026-07-01', // Canada Day

        // Pay Period Functions
        function getPayPeriod(date) {
            const d = new Date(date);
            const day = d.getDate();
            const month = d.getMonth();
            const year = d.getFullYear();
            
            if (day >= 9 && day <= 23) {
                // Period 1: 9th-23rd
                const start = new Date(year, month, 9);
                const end = new Date(year, month, 23, 23, 59, 59);
                return {
                    start: start,
                    end: end,
                    label: `${start.toLocaleString('default', { month: 'short' })} 9-23, ${year}`
                };
            } else if (day >= 24) {
                // Period 2: 24th-8th of next month
                const nextMonth = month + 1;
                const nextYear = nextMonth > 11 ? year + 1 : year;
                const adjustedMonth = nextMonth > 11 ? 0 : nextMonth;
                const start = new Date(year, month, 24);
                const end = new Date(nextYear, adjustedMonth, 8, 23, 59, 59);
                return {
                    start: start,
                    end: end,
                    label: `${start.toLocaleString('default', { month: 'short' })} 24 - ${end.toLocaleString('default', { month: 'short' })} 8, ${year}`
                };
            } else {
                // Days 1-8: part of previous month's 24-8 period
                const prevMonth = month - 1;
                const prevYear = prevMonth < 0 ? year - 1 : year;
                const adjustedMonth = prevMonth < 0 ? 11 : prevMonth;
                const start = new Date(prevYear, adjustedMonth, 24);
                const end = new Date(year, month, 8, 23, 59, 59);
                return {
                    start: start,
                    end: end,
                    label: `${start.toLocaleString('default', { month: 'short' })} 24 - ${end.toLocaleString('default', { month: 'short' })} 8, ${prevYear}`
                };
            }
        }

        function getCurrentPayPeriod() {
            return getPayPeriod(new Date());
        }

        function getPreviousPayPeriods(count = 6) {
            const periods = [];
            const currentPeriod = getPayPeriod(new Date());
            
            // Start from the day before current period to get the previous period
            let currentDate = new Date(currentPeriod.start);
            currentDate.setDate(currentDate.getDate() - 1);
            
            for (let i = 0; i < count; i++) {
                const period = getPayPeriod(currentDate);
                periods.push({
                    start: period.start,
                    end: period.end,
                    label: period.label,
                    value: period.start.toISOString().split('T')[0]
                });
                
                // Move to previous period
                currentDate = new Date(period.start);
                currentDate.setDate(currentDate.getDate() - 1);
            }
            
            return periods;
        }

        function isInPayPeriod(date, period) {
            const d = new Date(date);
            return d >= period.start && d <= period.end;
        }

        // ============================================
        // FIREBASE FUNCTIONS
        // ============================================

        // Load settings from Firebase
        async function loadSettings() {
            try {
                const doc = await db.collection('settings').doc('config').get();
                if (doc.exists) {
                    state.adminPin = doc.data().adminPin || '0000';
                } else {
                    // Initialize settings
                    await db.collection('settings').doc('config').set({
                        adminPin: '0000'
                    });
                }
            } catch (error) {
                console.error('Error loading settings:', error);
            }
        }

        // Save admin PIN to Firebase
        async function saveAdminPin(pin) {
            try {
                await db.collection('settings').doc('config').set({
                    adminPin: pin
                });
                state.adminPin = pin;
            } catch (error) {
                console.error('Error saving admin PIN:', error);
                alert('Error saving admin PIN');
            }
        }

        // Load employees from Firebase
        async function loadEmployees() {
            try {
                const snapshot = await db.collection('employees').orderBy('id').get();
                state.employees = [];
                snapshot.forEach(doc => {
                    state.employees.push({ ...doc.data(), docId: doc.id });
                });

                // If no employees, create defaults
                if (state.employees.length === 0) {
                    const defaultEmployees = [
                        { id: 1, name: 'Ian Laird', status: 'clocked-out', pin: '1111' },
                        { id: 2, name: 'Logan Deschenes', status: 'clocked-out', pin: '2222' },
                        { id: 3, name: 'Darin Kourie', status: 'clocked-out', pin: '3333' },
                        { id: 4, name: 'Cole Melvin', status: 'clocked-out', pin: '4444' },
                        { id: 5, name: 'Hillis Halbert', status: 'clocked-out', pin: '5555' },
                        { id: 6, name: 'Julie Dann', status: 'clocked-out', pin: '6666' },
                        { id: 7, name: 'Ryan King', status: 'clocked-out', pin: '7777' },
                        { id: 8, name: 'Jamie Roy', status: 'clocked-out', pin: '8888' },
                        { id: 9, name: 'Adrian Langereis', status: 'clocked-out', pin: '9191' }
                    ];

                    for (const emp of defaultEmployees) {
                        await db.collection('employees').add(emp);
                    }
                    await loadEmployees(); // Reload after creating
                }
            } catch (error) {
                console.error('Error loading employees:', error);
            }
        }

        // Load time entries from Firebase
        async function loadTimeEntries() {
            try {
                const snapshot = await db.collection('timeEntries').orderBy('clockIn', 'desc').get();
                state.timeEntries = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    state.timeEntries.push({
                        ...data,
                        docId: doc.id,
                        clockIn: data.clockIn.toDate(),
                        clockOut: data.clockOut ? data.clockOut.toDate() : null
                    });
                });
            } catch (error) {
                console.error('Error loading time entries:', error);
            }
        }

        // Load schedules from Firebase
        async function loadSchedules() {
            try {
                const snapshot = await db.collection('schedules').orderBy('date', 'asc').get();
                state.schedules = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    state.schedules.push({
                        ...data,
                        docId: doc.id,
                        date: data.date.toDate()
                    });
                });
            } catch (error) {
                console.error('Error loading schedules:', error);
            }
        }

        // Load time off requests from Firebase
        async function loadTimeOffRequests() {
            try {
                const snapshot = await db.collection('timeOffRequests').orderBy('requestDate', 'desc').get();
                state.timeOffRequests = [];
                snapshot.forEach(doc => {
                    const data = doc.data();
                    state.timeOffRequests.push({
                        ...data,
                        docId: doc.id,
                        startDate: data.startDate.toDate(),
                        endDate: data.endDate.toDate(),
                        requestDate: data.requestDate.toDate()
                    });
                });
            } catch (error) {
                console.error('Error loading time off requests:', error);
            }
        }

        // Add schedule to Firebase
        async function addScheduleToFirebase(schedule) {
            try {
                const docRef = await db.collection('schedules').add({
                    ...schedule,
                    date: firebase.firestore.Timestamp.fromDate(schedule.date)
                });
                schedule.docId = docRef.id;
                state.schedules.push(schedule);
            } catch (error) {
                console.error('Error adding schedule:', error);
                alert('Error adding schedule');
            }
        }

        // Delete schedule from Firebase
        async function deleteScheduleFromFirebase(docId) {
            try {
                await db.collection('schedules').doc(docId).delete();
                state.schedules = state.schedules.filter(s => s.docId !== docId);
            } catch (error) {
                console.error('Error deleting schedule:', error);
                alert('Error deleting schedule');
            }
        }

        // Add time off request to Firebase
        async function addTimeOffRequestToFirebase(request) {
            try {
                const docRef = await db.collection('timeOffRequests').add({
                    ...request,
                    startDate: firebase.firestore.Timestamp.fromDate(request.startDate),
                    endDate: firebase.firestore.Timestamp.fromDate(request.endDate),
                    requestDate: firebase.firestore.Timestamp.fromDate(request.requestDate)
                });
                request.docId = docRef.id;
                state.timeOffRequests.push(request);
            } catch (error) {
                console.error('Error adding time off request:', error);
                alert('Error requesting time off');
            }
        }

        // Update time off request status
        async function updateTimeOffRequestStatus(docId, status) {
            try {
                await db.collection('timeOffRequests').doc(docId).update({ status: status });
                const request = state.timeOffRequests.find(r => r.docId === docId);
                request.status = status;
            } catch (error) {
                console.error('Error updating time off request:', error);
                alert('Error updating request');
            }
        }

        // Add employee to Firebase
        async function addEmployeeToFirebase(employee) {
            try {
                const docRef = await db.collection('employees').add(employee);
                employee.docId = docRef.id;
                state.employees.push(employee);
            } catch (error) {
                console.error('Error adding employee:', error);
                alert('Error adding employee');
            }
        }

        // Update employee in Firebase
        async function updateEmployeeInFirebase(docId, updates) {
            try {
                await db.collection('employees').doc(docId).update(updates);
                const emp = state.employees.find(e => e.docId === docId);
                Object.assign(emp, updates);
            } catch (error) {
                console.error('Error updating employee:', error);
                alert('Error updating employee');
            }
        }

        // Delete employee from Firebase
        async function deleteEmployeeFromFirebase(docId, employeeId) {
            try {
                await db.collection('employees').doc(docId).delete();
                
                // Delete all time entries for this employee
                const entries = await db.collection('timeEntries').where('employeeId', '==', employeeId).get();
                const batch = db.batch();
                entries.forEach(doc => batch.delete(doc.ref));
                await batch.commit();
                
                state.employees = state.employees.filter(e => e.docId !== docId);
                state.timeEntries = state.timeEntries.filter(e => e.employeeId !== employeeId);
            } catch (error) {
                console.error('Error deleting employee:', error);
                alert('Error deleting employee');
            }
        }

        // Add time entry to Firebase
        async function addTimeEntryToFirebase(entry) {
            try {
                const docRef = await db.collection('timeEntries').add({
                    ...entry,
                    clockIn: firebase.firestore.Timestamp.fromDate(entry.clockIn),
                    clockOut: entry.clockOut ? firebase.firestore.Timestamp.fromDate(entry.clockOut) : null
                });
                entry.docId = docRef.id;
                state.timeEntries.unshift(entry);
            } catch (error) {
                console.error('Error adding time entry:', error);
                alert('Error adding time entry');
            }
        }

        // Update time entry in Firebase
        async function updateTimeEntryInFirebase(docId, updates) {
            try {
                const firebaseUpdates = {
                    ...updates,
                    clockOut: updates.clockOut ? firebase.firestore.Timestamp.fromDate(updates.clockOut) : null
                };
                await db.collection('timeEntries').doc(docId).update(firebaseUpdates);
                
                const entry = state.timeEntries.find(e => e.docId === docId);
                Object.assign(entry, updates);
            } catch (error) {
                console.error('Error updating time entry:', error);
                alert('Error updating time entry');
            }
        }

        // Update clock
        function updateClock() {
            const now = new Date();
            const timeEl = document.getElementById('currentTime');
            const dateEl = document.getElementById('currentDate');
            if (timeEl) timeEl.textContent = now.toLocaleTimeString();
            if (dateEl) dateEl.textContent = now.toLocaleDateString('en-US', {

        // Clock View
        function renderClockView() {
            const visibleEmployees = state.isAdmin ? state.employees : state.employees.filter(e => e.id === state.currentUser.id);
            
            document.getElementById('driverSelection').innerHTML = visibleEmployees.map(emp => `
                <div class="driver-card ${state.selectedEmployee === emp.id ? 'selected' : ''}" onclick="selectEmployee(${emp.id})">
                    <div class="driver-name">${emp.name}</div>
                    <div class="status-badge ${emp.status === 'clocked-in' ? 'status-in' : 'status-out'}">
                        ${emp.status === 'clocked-in' ? 'Clocked In' : 'Clocked Out'}
                    </div>
                </div>
            `).join('');
            
            if (state.selectedEmployee) {
                const emp = state.employees.find(e => e.id === state.selectedEmployee);
                const buttonClass = emp.status === 'clocked-out' ? 'btn-success' : 'btn-danger';
                const buttonText = emp.status === 'clocked-out' ? 'Clock In' : 'Clock Out';
                
                document.getElementById('clockAction').innerHTML = `
                    <div class="alert alert-info">
                        <strong>Selected: ${emp.name}</strong><br>
                        Status: ${emp.status === 'clocked-in' ? 'Clocked In' : 'Clocked Out'}
                    </div>
                    <button class="btn ${buttonClass} btn-block" onclick="clockAction()" style="font-size: 20px; padding: 20px;">
                        ${buttonText}
                    </button>
                    <div class="alert alert-warning" style="margin-top: 16px;">
                        <strong>Location tracking enabled:</strong> Your location will be recorded when clocking in/out.
                    </div>
                `;
            } else {
                document.getElementById('clockAction').innerHTML = '<p class="subtitle text-center">Please select an employee to clock in/out</p>';
            }
        }

        function selectEmployee(id) {
            state.selectedEmployee = id;
            renderClockView();
        }

        async function clockAction() {
            if (!state.selectedEmployee) {
                alert('Please select an employee');
                return;
            }
            
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    async (position) => {
                        const location = {
                            latitude: position.coords.latitude,
                            longitude: position.coords.longitude
                        };
                        await processClock(location);
                    },
                    (error) => {
                        alert('Unable to get location. Please enable location services.');
                    }
                );
            } else {
                alert('Geolocation is not supported by this browser.');
            }
        }

        async function processClock(location) {
            const emp = state.employees.find(e => e.id === state.selectedEmployee);
            const now = new Date();
            
            if (emp.status === 'clocked-out') {
                // Clock in
                const newEntry = {
                    id: Date.now(),
                    employeeId: emp.id,
                    employeeName: emp.name,
                    clockIn: now,
                    clockInLocation: location,
                    clockOut: null,
                    clockOutLocation: null
                };
                
                await addTimeEntryToFirebase(newEntry);
                await updateEmployeeInFirebase(emp.docId, { status: 'clocked-in' });
                alert('Clocked in successfully!');
            } else {
                // Clock out
                const entry = state.timeEntries.find(e => e.employeeId === emp.id && !e.clockOut);
                if (entry) {
                    await updateTimeEntryInFirebase(entry.docId, {
                        clockOut: now,
                        clockOutLocation: location
                    });
                }
                await updateEmployeeInFirebase(emp.docId, { status: 'clocked-out' });
                alert('Clocked out successfully!');
            }
            
            renderClockView();
        }

        // Manual entry functions
        async function addManualEntry() {
            const employeeId = parseInt(document.getElementById('manualEmployee').value);
            const date = document.getElementById('manualDate').value;
            const clockInTime = document.getElementById('manualClockIn').value;
            const clockOutTime = document.getElementById('manualClockOut').value;
            
            if (!date || !clockInTime || !clockOutTime) {
                alert('Please fill in all fields');
                return;
            }
            
            const employee = state.employees.find(e => e.id === employeeId);
            
            const clockInDate = new Date(date + 'T' + clockInTime);
            const clockOutDate = new Date(date + 'T' + clockOutTime);
            
            // Handle overnight shifts
            if (clockOutDate < clockInDate) {
                clockOutDate.setDate(clockOutDate.getDate() + 1);
            }
            
            const entry = {
                id: Date.now(),
                employeeId: employeeId,
                employeeName: employee.name,
                clockIn: clockInDate,
                clockInLocation: { latitude: 0, longitude: 0 }, // Manual entry marker
                clockOut: clockOutDate,
                clockOutLocation: { latitude: 0, longitude: 0 }
            };
            
            await addTimeEntryToFirebase(entry);
            alert('Manual entry added successfully!');
            document.getElementById('manualDate').value = '';
            document.getElementById('manualClockIn').value = '';
            document.getElementById('manualClockOut').value = '';
            renderTimesheetView();
        }

        async function editTimeEntry(docId) {
            const entry = state.timeEntries.find(e => e.docId === docId);
            if (!entry) return;
            
            // Create edit dialog
            const clockInStr = entry.clockIn.toISOString().slice(0, 16);
            const clockOutStr = entry.clockOut ? entry.clockOut.toISOString().slice(0, 16) : '';
            
            const newClockIn = prompt(`Edit Clock In time for ${entry.employeeName}:\n\nFormat: YYYY-MM-DD HH:MM`, clockInStr.replace('T', ' '));
            if (!newClockIn) return;
            
            const newClockOut = prompt(`Edit Clock Out time for ${entry.employeeName}:\n\nFormat: YYYY-MM-DD HH:MM`, clockOutStr.replace('T', ' '));
            if (!newClockOut) return;
            
            try {
                const updatedClockIn = new Date(newClockIn.replace(' ', 'T'));
                const updatedClockOut = new Date(newClockOut.replace(' ', 'T'));
                
                if (isNaN(updatedClockIn.getTime()) || isNaN(updatedClockOut.getTime())) {
                    alert('Invalid date format');
                    return;
                }
                
                await updateTimeEntryInFirebase(docId, {
                    clockIn: updatedClockIn,
                    clockOut: updatedClockOut
                });
                
                alert('Time entry updated!');
                renderTimesheetView();
            } catch (error) {
                alert('Error updating entry: ' + error.message);
            }
        }

        async function deleteTimeEntry(docId) {
            const entry = state.timeEntries.find(e => e.docId === docId);
            if (!entry) return;
            
            if (!confirm(`Delete this time entry for ${entry.employeeName}?\n\nClock In: ${entry.clockIn.toLocaleString()}\nClock Out: ${entry.clockOut ? entry.clockOut.toLocaleString() : 'In Progress'}`)) {
                return;
            }
            
            try {
                await db.collection('timeEntries').doc(docId).delete();
                state.timeEntries = state.timeEntries.filter(e => e.docId !== docId);
                alert('Time entry deleted!');
                renderTimesheetView();
            } catch (error) {
                alert('Error deleting entry: ' + error.message);
            }
        }

            const upcomingSchedules = state.schedules
                .filter(s => s.date >= today)

                                            <div>
                                                <div class="driver-name">${emp ? emp.name : 'Unknown'}</div>
                                                <div class="subtitle">${sched.shiftType === 'day' ? 'Day Shift' : sched.shiftType === 'evening' ? 'Evening Shift' : 'Custom'}: ${sched.startTime} - ${sched.endTime}</div>
                                            </div>
                                            <button class="btn btn-danger" onclick="deleteSchedule('${sched.docId}')">Delete</button>
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                }).join('');
            
            document.getElementById('scheduleContent').innerHTML = scheduleForm + schedulesList;
        }

        function updateShiftTimes() {
            const shiftType = document.getElementById('scheduleShiftType').value;
            const customDiv = document.getElementById('customTimesDiv');
            
            if (shiftType === 'custom') {
                customDiv.classList.remove('hidden');
            } else {
                customDiv.classList.add('hidden');
            }
        }

        async function addSchedule() {
            const employeeId = parseInt(document.getElementById('scheduleEmployee').value);
            const dateStr = document.getElementById('scheduleDate').value;
            const shiftType = document.getElementById('scheduleShiftType').value;
            
            if (!dateStr) {
                alert('Please select a date');
                return;
            }
            
            let startTime, endTime;
            if (shiftType === 'day') {
                startTime = '08:00';
                endTime = '16:00';
            } else if (shiftType === 'evening') {
                startTime = '16:00';
                endTime = '00:00';
            } else {
                startTime = document.getElementById('scheduleStartTime').value;
                endTime = document.getElementById('scheduleEndTime').value;
                if (!startTime || !endTime) {
                    alert('Please enter start and end times');
                    return;
                }
            }
            
            const employee = state.employees.find(e => e.id === employeeId);
            const schedule = {
                employeeId: employeeId,
                employeeName: employee.name,
                date: new Date(dateStr + 'T12:00:00'),
                shiftType: shiftType,
                startTime: startTime,
                endTime: endTime
            };
            
            await addScheduleToFirebase(schedule);
            alert('Schedule added successfully!');
            renderScheduleView();
        }

        async function deleteSchedule(docId) {
            if (!confirm('Delete this schedule?')) return;
            await deleteScheduleFromFirebase(docId);
            renderScheduleView();
        }

        function renderDriverScheduleView() {
            document.getElementById('scheduleViewTitle').textContent = 'My Schedule';
            
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            
            const mySchedules = state.schedules
                .filter(s => s.employeeId === state.currentUser.id && s.date >= today)
                .sort((a, b) => a.date - b.date);
            
            if (mySchedules.length === 0) {
                document.getElementById('scheduleContent').innerHTML = '<p class="subtitle text-center">No upcoming shifts scheduled</p>';
                return;
            }
            
            const scheduleList = mySchedules.map(sched => {
                const date = sched.date;
                const isToday = date.toDateString() === new Date().toDateString();
                
                return `
                    <div class="driver-card" style="border-left: 4px solid ${isToday ? '#48bb78' : '#667eea'};">
                        <div>
                            <div class="driver-name">
                                ${date.toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' })}
                                ${isToday ? '<span style="color: #48bb78; margin-left: 8px;">(Today)</span>' : ''}
                            </div>
                            <div class="subtitle">
                                ${sched.shiftType === 'day' ? 'Day Shift' : sched.shiftType === 'evening' ? 'Evening Shift' : 'Custom'}: 
                                ${sched.startTime} - ${sched.endTime}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('scheduleContent').innerHTML = scheduleList;
        }

        // ============================================
        // TIME OFF VIEW
        // ============================================

        function renderTimeOffView() {
            if (state.isAdmin) {
                renderAdminTimeOffView();
            } else {
                renderDriverTimeOffView();
            }
        }

        function renderAdminTimeOffView() {
            document.getElementById('timeoffViewTitle').textContent = 'Time Off Requests';
            
            const pendingRequests = state.timeOffRequests.filter(r => r.status === 'pending');
            const otherRequests = state.timeOffRequests.filter(r => r.status !== 'pending');
            
            const pendingSection = pendingRequests.length === 0
                ? '<p class="subtitle">No pending requests</p>'
                : pendingRequests.map(req => {
                    const emp = state.employees.find(e => e.id === req.employeeId);
                    return `
                        <div class="driver-card">
                            <div style="flex: 1;">
                                <div class="driver-name">${emp ? emp.name : 'Unknown'}</div>
                                <div class="subtitle">
                                    ${req.startDate.toLocaleDateString()} - ${req.endDate.toLocaleDateString()}
                                    <br>Type: ${req.type === 'vacation' ? 'Vacation' : 'Sick Day'}
                                    ${req.notes ? `<br>Notes: ${req.notes}` : ''}
                                </div>
                            </div>
                            <div style="display: flex; gap: 8px;">
                                <button class="btn btn-success" onclick="approveTimeOff('${req.docId}')">Approve</button>
                                <button class="btn btn-danger" onclick="denyTimeOff('${req.docId}')">Deny</button>
                            </div>
                        </div>
                    `;
                }).join('');
            
            const otherSection = otherRequests.length === 0
                ? ''
                : `
                    <h3 style="margin-top: 24px; margin-bottom: 12px;">Recent Requests</h3>
                    ${otherRequests.slice(0, 10).map(req => {
                        const emp = state.employees.find(e => e.id === req.employeeId);
                        const statusColor = req.status === 'approved' ? '#48bb78' : '#f56565';
                        return `
                            <div class="driver-card">
                                <div>
                                    <div class="driver-name">${emp ? emp.name : 'Unknown'}</div>
                                    <div class="subtitle">
                                        ${req.startDate.toLocaleDateString()} - ${req.endDate.toLocaleDateString()}
                                        <br>Type: ${req.type === 'vacation' ? 'Vacation' : 'Sick Day'}
                                        <br><span style="color: ${statusColor}; font-weight: 600;">${req.status.toUpperCase()}</span>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('')}
                `;
            
            document.getElementById('timeoffContent').innerHTML = `
                <h3 style="margin-bottom: 12px;">Pending Requests</h3>
                ${pendingSection}
                ${otherSection}
            `;
        }

        async function approveTimeOff(docId) {
            await updateTimeOffRequestStatus(docId, 'approved');
            renderTimeOffView();
        }

        async function denyTimeOff(docId) {
            await updateTimeOffRequestStatus(docId, 'denied');
            renderTimeOffView();
        }

        function renderDriverTimeOffView() {
            document.getElementById('timeoffViewTitle').textContent = 'My Time Off';
            
            // Request form
            const requestForm = `
                <div style="margin-bottom: 24px; padding: 20px; background: #f7fafc; border-radius: 8px;">
                    <h3 style="margin-bottom: 16px;">Request Time Off</h3>
                    <div class="grid grid-2">
                        <div>
                            <label>Start Date</label>
                            <input type="date" id="timeoffStartDate" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        </div>
                        <div>
                            <label>End Date</label>
                            <input type="date" id="timeoffEndDate" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                        </div>
                    </div>
                    <div style="margin-top: 12px;">
                        <label>Type</label>
                        <select id="timeoffType" style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                            <option value="vacation">Vacation</option>
                            <option value="sick">Sick Day</option>
                        </select>
                    </div>
                    <div style="margin-top: 12px;">
                        <label>Notes (optional)</label>
                        <input type="text" id="timeoffNotes" placeholder="Any additional notes..." style="width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px;">
                    </div>
                    <button class="btn btn-success" onclick="submitTimeOffRequest()" style="margin-top: 16px;">Submit Request</button>
                </div>
            `;
            
            // My requests
            const myRequests = state.timeOffRequests.filter(r => r.employeeId === state.currentUser.id);
            
            const requestsList = myRequests.length === 0
                ? '<p class="subtitle text-center">No time off requests yet</p>'
                : myRequests.map(req => {
                    const statusColor = req.status === 'pending' ? '#667eea' : req.status === 'approved' ? '#48bb78' : '#f56565';
                    return `
                        <div class="driver-card">
                            <div>
                                <div class="driver-name">${req.startDate.toLocaleDateString()} - ${req.endDate.toLocaleDateString()}</div>
                                <div class="subtitle">
                                    Type: ${req.type === 'vacation' ? 'Vacation' : 'Sick Day'}
                                    ${req.notes ? `<br>Notes: ${req.notes}` : ''}
                                    <br><span style="color: ${statusColor}; font-weight: 600;">${req.status.toUpperCase()}</span>
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
            
            document.getElementById('timeoffContent').innerHTML = requestForm + '<h3 style="margin-bottom: 12px;">My Requests</h3>' + requestsList;
        }

        async function submitTimeOffRequest() {
            const startDate = document.getElementById('timeoffStartDate').value;
            const endDate = document.getElementById('timeoffEndDate').value;
            const type = document.getElementById('timeoffType').value;
            const notes = document.getElementById('timeoffNotes').value;
            
            if (!startDate || !endDate) {
                alert('Please select start and end dates');
                return;
            }
            
            if (new Date(startDate) > new Date(endDate)) {
                alert('End date must be after start date');
                return;
            }
            
            const request = {
                employeeId: state.currentUser.id,
                employeeName: state.currentUser.name,
                startDate: new Date(startDate + 'T12:00:00'),
                endDate: new Date(endDate + 'T12:00:00'),
                type: type,
                notes: notes,
                status: 'pending',
                requestDate: new Date()
            };
            
            await addTimeOffRequestToFirebase(request);
            alert('Time off request submitted!');
            document.getElementById('timeoffStartDate').value = '';
            document.getElementById('timeoffEndDate').value = '';
            document.getElementById('timeoffNotes').value = '';
            renderTimeOffView();
        }
        async function changeAdminPin() {
            const newPin = document.getElementById('newAdminPin').value;
            if (!newPin || newPin.length < 4) {
                alert('PIN must be at least 4 digits');
                return;
            }
            await saveAdminPin(newPin);
            alert('Admin PIN changed successfully!');
            document.getElementById('newAdminPin').value = '';
        }

        async function addDriver() {
            const name = document.getElementById('newDriverName').value;
            const pin = document.getElementById('newDriverPin').value;
            
            if (!name.trim()) {
                alert('Please enter a driver name');
                return;
            }
            if (!pin || pin.length < 4) {
                alert('PIN must be at least 4 digits');
                return;
            }
            
            const newId = state.employees.length > 0 ? Math.max(...state.employees.map(e => e.id)) + 1 : 1;
            const newDriver = {
                id: newId,
                name: name.trim(),
                status: 'clocked-out',
                pin: pin
            };
            
            await addEmployeeToFirebase(newDriver);
            alert(`Driver ${name} added successfully!`);
            document.getElementById('newDriverName').value = '';
            document.getElementById('newDriverPin').value = '';
            renderSettingsView();
            renderLogin();
        }

        async function changeDriverPin(docId, id) {
            const driver = state.employees.find(e => e.id === id);
            const newPin = prompt(`Enter new PIN for ${driver.name}:`, driver.pin);
            if (!newPin || newPin.length < 4) {
                alert('PIN must be at least 4 digits');
                return;
            }
            await updateEmployeeInFirebase(docId, { pin: newPin });
            alert('PIN updated successfully!');
            renderSettingsView();
        }

        async function removeDriver(docId, id, name) {
            if (!confirm(`Are you sure you want to remove ${name}? This will also delete all their time entries.`)) {
                return;
            }
            await deleteEmployeeFromFirebase(docId, id);
            alert(`${name} has been removed.`);
            renderSettingsView();
            renderLogin();
        }

        // Utility Functions
        function formatLocation(loc) {
            if (!loc) return 'N/A';
            return `${loc.latitude.toFixed(6)}, ${loc.longitude.toFixed(6)}`;
        }

        function formatDuration(start, end) {
            const hours = (end - start) / (1000 * 60 * 60);
            const h = Math.floor(hours);
            const m = Math.floor((hours - h) * 60);
            return `${h}h ${m}m`;
        }

        function calculateTotals(employee, entries) {
            let totals = { 
                regularHours: 0, 
                overtimeHours: 0, 
                doubleTimeHours: 0, 
                statHolidayHours: 0, 
                hours: 0 
            };
            
            entries.forEach(entry => {
                const hoursBreakdown = calculateHours(entry, employee);
                totals.regularHours += hoursBreakdown.regularHours;
                totals.overtimeHours += hoursBreakdown.overtimeHours;
                totals.doubleTimeHours += hoursBreakdown.doubleTimeHours;
                totals.statHolidayHours += hoursBreakdown.statHolidayHours;
                totals.hours += hoursBreakdown.totalHours;
            });
            
            return totals;
        }

        function calculateHours(entry, employee) {
            const clockIn = entry.clockIn;
            const clockOut = entry.clockOut;
            const hours = (clockOut - clockIn) / (1000 * 60 * 60);
            
            const isHoliday = statHolidays.includes(clockIn.toISOString().split('T')[0]);
            
            let regularHours = 0, overtimeHours = 0, doubleTimeHours = 0, statHolidayHours = 0;
            
            if (isHoliday) {
                statHolidayHours = hours;
            } else if (hours <= 9) {
                regularHours = hours;
            } else if (hours <= 12) {
                regularHours = 9;
                overtimeHours = hours - 9;
            } else {
                regularHours = 9;
                overtimeHours = 3;
                doubleTimeHours = hours - 12;
            }
            
            return {
                regularHours: regularHours,
                overtimeHours: overtimeHours,
                doubleTimeHours: doubleTimeHours,
                statHolidayHours: statHolidayHours,
                totalHours: hours
            };
        }

        // Initialize app when Firebase is ready
        init();

        // Register service worker for PWA
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(registration => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
